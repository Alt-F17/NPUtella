name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: [self-hosted, windows, arm64]
    env:
      NPUTELLA_RELEASE_ASSET_ROOT: ${{ secrets.NPUTELLA_RELEASE_ASSET_ROOT }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Rust ARM64 target
        shell: pwsh
        run: rustup target add aarch64-pc-windows-msvc

      - name: Set up .NET SDK for WiX
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Prepare release asset bundle
        shell: pwsh
        run: ./scripts/prepare-release-assets.ps1

      - name: Install WiX
        shell: pwsh
        run: |
          $installed = dotnet tool list --global | Select-String -Pattern '^wix\s'
          if ($installed) {
            dotnet tool update --global wix --version 4.0.4
          } else {
            dotnet tool install --global wix --version 4.0.4
          }
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build installer
        shell: pwsh
        run: ./scripts/build-installer.ps1

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            dist/*.msi
            dist/*.sha256
            dist/stage/manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
